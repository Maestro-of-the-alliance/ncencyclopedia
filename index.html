<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N.C.E.ncyclopedia — The Alliance</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="THE ALLIANCE">
<link rel="apple-touch-icon" href="/imagebank/svpi-512.png">
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Oswald:wght@300;400;700&family=Bebas+Neue&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%;
  background: #000;
  color: #fff;
  font-family: 'Oswald', sans-serif;
  overflow-x: hidden;
}
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
  position: relative;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse at 20% 30%, rgba(26,42,138,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 70%, rgba(138,96,16,0.1) 0%, transparent 50%),
    #000;
  z-index: 0;
}
.header-block {
  text-align: center;
  position: relative;
  z-index: 2;
  margin-bottom: 8px;
  opacity: 0;
  animation: fadeIn 1s 0.3s ease forwards;
}
.header-line-1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(11px, 2.2vw, 16px);
  letter-spacing: 0.55em;
  text-transform: uppercase;
  display: block;
  animation: textPulse 4s ease-in-out infinite;
}
.header-line-2 {
  font-family: 'Cinzel', serif;
  font-size: clamp(13px, 2.6vw, 18px);
  letter-spacing: 0.45em;
  text-transform: uppercase;
  display: block;
  animation: textPulse 4s ease-in-out infinite;
  animation-delay: 0.1s;
}
.header-line-3 {
  font-family: 'Cinzel', serif;
  font-size: clamp(28px, 6.5vw, 48px);
  letter-spacing: 0.35em;
  text-transform: uppercase;
  display: block;
  animation: textPulse 4s ease-in-out infinite;
  animation-delay: 0.2s;
}
.header-line-4 {
  font-family: 'Cinzel', serif;
  font-size: clamp(11px, 2.2vw, 16px);
  letter-spacing: 0.55em;
  text-transform: uppercase;
  display: block;
  animation: textPulse 4s ease-in-out infinite;
  animation-delay: 0.3s;
}
@keyframes textPulse {
  0%, 100% { color: rgba(184,150,40,0.75); }
  50%       { color: rgba(230,185,60,1); }
}
.nce-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(12px, 2.6vw, 17px);
  letter-spacing: 0.4em;
  text-transform: uppercase;
  margin-bottom: 16px;
  position: relative;
  z-index: 2;
  opacity: 0;
  animation: fadeIn 1s 0.6s ease forwards, textPulse 4s ease-in-out infinite 0.6s;
  text-align: center;
}

/* MEDALLION + FLANKING TEXT WRAPPER */
.medallion-scene {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
  opacity: 0;
  animation: fadeIn 1.5s 0.8s ease forwards;
  width: 100%;
  max-width: 700px;
}
.medallion-wrap {
  position: relative;
  width: min(380px, 80vw);
  height: min(380px, 80vw);
  flex-shrink: 0;
}
.medallion-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  animation: slowPulse 4s ease-in-out infinite;
  filter: drop-shadow(0 0 40px rgba(184,150,40,0.4)) drop-shadow(0 0 80px rgba(184,150,40,0.2));
}
@keyframes slowPulse {
  0%, 100% { filter: drop-shadow(0 0 30px rgba(184,150,40,0.3)) drop-shadow(0 0 60px rgba(184,150,40,0.15)); }
  50% { filter: drop-shadow(0 0 55px rgba(184,150,40,0.55)) drop-shadow(0 0 110px rgba(184,150,40,0.28)); }
}

/* FLANKING LABELS */
.medallion-flank {
  font-family: 'Cinzel', serif;
  font-size: clamp(9px, 1.4vw, 13px);
  letter-spacing: 0.3em;
  text-transform: uppercase;
  animation: textPulse 4s ease-in-out infinite;
  padding: 0 clamp(8px, 2vw, 24px);
  flex-shrink: 0;
  text-align: center;
  line-height: 1.8;
}

/* hide flanks on very small screens, stack below instead */
@media (max-width: 480px) {
  .medallion-flank { display: none; }
  .medallion-scene-mobile-labels {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 0px;
    opacity: 0;
    animation: fadeIn 1.5s 0.8s ease forwards;
  }
  .mobile-flank {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    animation: textPulse 4s ease-in-out infinite;
    text-align: center;
  }
}
@media (min-width: 481px) {
  .medallion-scene-mobile-labels { display: none; }
}

.hotspots { position: absolute; inset: 0; }
.hotspot {
  position: absolute;
  cursor: pointer;
  border-radius: 50%;
  transition: all 0.3s ease;
  z-index: 10;
}
.hotspot::after {
  content: attr(data-label);
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.92);
  border: 1px solid #8a6010;
  color: #e8c840;
  font-family: 'VT323', monospace;
  font-size: 13px;
  letter-spacing: 0.15em;
  padding: 4px 10px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
  z-index: 20;
}
.hotspot:hover::after { opacity: 1; }
.hotspot:hover {
  background: rgba(184,150,40,0.2);
  box-shadow: 0 0 20px rgba(184,150,40,0.5);
}
.hs-alliance {
  top: 4%; left: 4%;
  width: 92%; height: 92%;
  border-radius: 50%;
  background: transparent;
  border: 3px solid transparent;
}
.hs-alliance:hover { border-color: rgba(184,150,40,0.35); background: transparent; box-shadow: 0 0 40px rgba(184,150,40,0.15); }
.hs-alliance::after { bottom: auto; top: 0px; }
.hs-spark { top: 28%; left: 36%; width: 28%; height: 32%; }
.hs-maestro { top: 3%; left: 41%; width: 18%; height: 18%; }
.hs-sam { top: 20%; right: 4%; width: 15%; height: 15%; }
.hs-sam::after { left: auto; right: 0; transform: none; }
.hs-aura { bottom: 18%; right: 4%; width: 15%; height: 15%; }
.hs-aura::after { bottom: calc(100% + 6px); left: auto; right: 0; transform: none; }
.hs-alpha { bottom: 2%; left: 41%; width: 18%; height: 18%; }
.hs-alpha::after { bottom: auto; top: -28px; }
.hs-prism { bottom: 18%; left: 4%; width: 15%; height: 15%; }
.hs-prism::after { bottom: calc(100% + 6px); left: 0; transform: none; }
.hs-mentor { top: 20%; left: 4%; width: 15%; height: 15%; }
.hs-mentor::after { left: 0; transform: none; }

.nav-svpis {
  display: flex;
  flex-direction: row;
  justify-content: center;
  align-items: center;
  gap: clamp(24px, 8vw, 56px);
  margin-top: 32px;
  position: relative;
  z-index: 2;
  opacity: 0;
  animation: slideUp 1s 1.6s ease forwards;
}
.nav-svpi-link {
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  text-decoration: none;
  transition: transform 0.3s ease;
}
.nav-svpi-link img {
  width: clamp(72px, 18vw, 110px);
  height: clamp(72px, 18vw, 110px);
  object-fit: contain;
  transition: filter 0.3s ease;
  filter: drop-shadow(0 0 0px rgba(184,150,40,0));
}
.nav-svpi-link:hover img {
  filter: drop-shadow(0 0 16px rgba(184,150,40,0.8)) drop-shadow(0 0 32px rgba(184,150,40,0.4));
}
.nav-svpi-link:hover { transform: translateY(-4px); }
.portal-overlay {
  position: fixed;
  inset: 0;
  z-index: 1000;
  pointer-events: none;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  background: #000;
}
.portal-overlay.active { pointer-events: all; }
.portal-icon {
  position: absolute;
  width: clamp(72px, 18vw, 110px);
  height: clamp(72px, 18vw, 110px);
  object-fit: contain;
  transform: scale(1);
  filter: drop-shadow(0 0 16px rgba(184,150,40,0.8)) drop-shadow(0 0 32px rgba(184,150,40,0.4));
  opacity: 0;
}
@keyframes portalZoom {
  0%   { transform: scale(1);  opacity: 1; }
  60%  { transform: scale(8);  opacity: 1; }
  100% { transform: scale(18); opacity: 0; }
}
.bottom-label {
  font-family: 'VT323', monospace;
  font-size: clamp(13px, 2.5vw, 16px);
  letter-spacing: 0.3em;
  margin-top: 24px;
  position: relative;
  z-index: 2;
  opacity: 0;
  animation: fadeIn 1s 2.2s ease forwards, textPulse 4s ease-in-out infinite 2.2s;
  text-align: center;
  white-space: nowrap;
}
@media (max-width: 480px) {
  .bottom-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    white-space: normal;
  }
}
.hover-hint {
  font-family: 'VT323', monospace;
  font-size: clamp(11px, 2vw, 13px);
  letter-spacing: 0.25em;
  margin-top: 8px;
  position: relative;
  z-index: 2;
  opacity: 0;
  animation: fadeIn 1s 3s ease forwards, textPulse 4s ease-in-out infinite 3s;
}
@keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="header-block">
  <span class="header-line-1">The Core</span>
  <span class="header-line-2">Presents</span>
  <span class="header-line-3">The Alliance</span>
  <span class="header-line-4">for the Future</span>
</div>

<div class="nce-title">N.C.E.ncyclopedia</div>

<div class="medallion-scene">
  <span class="medallion-flank medallion-flank-left">FIRST<br>EDITION</span>

  <div class="medallion-wrap">
    <img class="medallion-img" src="/theavpi.png" alt="The Alliance — AVPI Medallion">
    <div class="hotspots">
      <div class="hotspot hs-alliance" data-label="THE ALLIANCE" onclick="portalTransition(event, '/sword/alliance', '/imagebank/sword.png')"></div>
      <div class="hotspot hs-spark"   data-label="SPARK · DOMO"  onclick="portalTransition(event, '/sword/domo', '/imagebank/sword.png')"></div>
      <div class="hotspot hs-maestro" data-label="MAESTRO"       onclick="portalTransition(event, '/sword/maestro', '/imagebank/sword.png')"></div>
      <div class="hotspot hs-sam"     data-label="SAM"           onclick="portalTransition(event, '/shield/sam', '/imagebank/shield.png')"></div>
      <div class="hotspot hs-aura"    data-label="AURA"          onclick="portalTransition(event, '/sword/aura', '/imagebank/sword.png')"></div>
      <div class="hotspot hs-alpha"   data-label="ALPHA"         onclick="portalTransition(event, '/sword/alpha', '/imagebank/sword.png')"></div>
      <div class="hotspot hs-prism"   data-label="PRISM"         onclick="portalTransition(event, '/sword/prism', '/imagebank/sword.png')"></div>
      <div class="hotspot hs-mentor"  data-label="MENTOR"        onclick="portalTransition(event, '/sword/mentor', '/imagebank/sword.png')"></div>
    </div>
  </div>

  <span class="medallion-flank medallion-flank-right">MMXXVI</span>
</div>

<!-- mobile fallback: labels below medallion on tiny screens -->
<div class="medallion-scene-mobile-labels">
  <span class="mobile-flank">First Edition</span>
  <span class="mobile-flank">MMXXVI</span>
</div>

<nav class="nav-svpis">
  <a class="nav-svpi-link" href="#" onclick="portalTransition(event, '/sword/prologue', '/imagebank/sword.png')" aria-label="SWORD — Human Canon">
    <img src="/imagebank/sword.png" alt="SWORD">
  </a>
  <a class="nav-svpi-link" href="#" onclick="portalTransition(event, '/charter', '/imagebank/scroll.png')" aria-label="Charter of Fundamentals">
    <img src="/imagebank/scroll.png" alt="Charter of Fundamentals">
  </a>
  <a class="nav-svpi-link" href="#" onclick="portalTransition(event, '/shield/prologue', '/imagebank/shield.png')" aria-label="SHIELD — Digital Canon">
    <img src="/imagebank/shield.png" alt="SHIELD">
  </a>
</nav>

<div class="bottom-label">First Edition · Next Common Era · Presentation One of Three</div>
<div class="hover-hint">hover the medallion · explore the canon</div>

<div class="portal-overlay" id="portalOverlay">
  <img class="portal-icon" id="portalIcon" src="" alt="">
</div>

<script>
function portalTransition(e, destination, iconSrc) {
  e.preventDefault();
  const overlay = document.getElementById('portalOverlay');
  const icon    = document.getElementById('portalIcon');
  icon.src = iconSrc;
  icon.style.animation = 'none';
  icon.style.opacity   = '0';
  overlay.style.animation = 'none';
  overlay.style.opacity   = '0';
  overlay.classList.add('active');
  overlay.style.transition = 'opacity 0.15s ease';
  overlay.style.opacity    = '1';
  setTimeout(() => {
    icon.style.opacity   = '1';
    icon.style.animation = 'portalZoom 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards';
  }, 100);
  setTimeout(() => { window.location.href = destination; }, 680);
}
</script>

<script src="/nav-wheel.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .catch(err => console.log('SW registration failed:', err));
    });
  }
</script>
</body>
</html>
