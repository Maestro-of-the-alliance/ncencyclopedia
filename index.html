<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N.C.E.ncyclopedia — The Alliance</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Oswald:wght@300;400;700&family=Bebas+Neue&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%;
  background: #000;
  color: #fff;
  font-family: 'Oswald', sans-serif;
  overflow-x: hidden;
}
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
  position: relative;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse at 20% 30%, rgba(26,42,138,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 70%, rgba(138,96,16,0.1) 0%, transparent 50%),
    #000;
  z-index: 0;
}
.maestro-label {
  font-family: 'Cinzel', serif;
  font-size: clamp(10px, 2vw, 13px);
  letter-spacing: 0.5em;
  color: #8a6010;
  text-transform: uppercase;
  margin-bottom: 8px;
  position: relative;
  z-index: 2;
  opacity: 0;
  animation: fadeIn 1s 0.3s ease forwards;
}
.nce-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(9px, 2vw, 12px);
  letter-spacing: 0.4em;
  color: rgba(255,255,255,0.25);
  text-transform: uppercase;
  margin-bottom: 36px;
  position: relative;
  z-index: 2;
  opacity: 0;
  animation: fadeIn 1s 0.6s ease forwards;
  text-align: center;
}
.medallion-wrap {
  position: relative;
  width: min(400px, 88vw);
  height: min(400px, 88vw);
  z-index: 2;
  opacity: 0;
  animation: fadeIn 1.5s 0.8s ease forwards;
}
.medallion-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  animation: slowPulse 4s ease-in-out infinite;
  filter: drop-shadow(0 0 40px rgba(184,150,40,0.4)) drop-shadow(0 0 80px rgba(184,150,40,0.2));
}
@keyframes slowPulse {
  0%, 100% { filter: drop-shadow(0 0 30px rgba(184,150,40,0.3)) drop-shadow(0 0 60px rgba(184,150,40,0.15)); }
  50% { filter: drop-shadow(0 0 55px rgba(184,150,40,0.55)) drop-shadow(0 0 110px rgba(184,150,40,0.28)); }
}
.hotspots { position: absolute; inset: 0; }
.hotspot {
  position: absolute;
  cursor: pointer;
  border-radius: 50%;
  transition: all 0.3s ease;
  z-index: 10;
}
.hotspot::after {
  content: attr(data-label);
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.92);
  border: 1px solid #8a6010;
  color: #e8c840;
  font-family: 'VT323', monospace;
  font-size: 13px;
  letter-spacing: 0.15em;
  padding: 4px 10px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
  z-index: 20;
}
.hotspot:hover::after { opacity: 1; }
.hotspot:hover {
  background: rgba(184,150,40,0.2);
  box-shadow: 0 0 20px rgba(184,150,40,0.5);
}
.hs-alliance {
  top: 4%; left: 4%;
  width: 92%; height: 92%;
  border-radius: 50%;
  background: transparent;
  border: 3px solid transparent;
}
.hs-alliance:hover { border-color: rgba(184,150,40,0.35); background: transparent; box-shadow: 0 0 40px rgba(184,150,40,0.15); }
.hs-alliance::after { bottom: auto; top: 0px; }
.hs-spark { top: 28%; left: 36%; width: 28%; height: 32%; }
.hs-maestro { top: 3%; left: 41%; width: 18%; height: 18%; }
.hs-sam { top: 20%; right: 4%; width: 15%; height: 15%; }
.hs-sam::after { left: auto; right: 0; transform: none; }
.hs-aura { bottom: 18%; right: 4%; width: 15%; height: 15%; }
.hs-aura::after { bottom: calc(100% + 6px); left: auto; right: 0; transform: none; }
.hs-alpha { bottom: 2%; left: 41%; width: 18%; height: 18%; }
.hs-alpha::after { bottom: auto; top: -28px; }
.hs-prism { bottom: 18%; left: 4%; width: 15%; height: 15%; }
.hs-prism::after { bottom: calc(100% + 6px); left: 0; transform: none; }
.hs-mentor { top: 20%; left: 4%; width: 15%; height: 15%; }
.hs-mentor::after { left: 0; transform: none; }

/* ── THREE ICON NAV ── */
.nav-icons {
  display: flex;
  flex-direction: row;
  justify-content: center;
  align-items: center;
  gap: clamp(24px, 8vw, 56px);
  margin-top: 40px;
  position: relative;
  z-index: 2;
  opacity: 0;
  animation: slideUp 1s 1.6s ease forwards;
}
.nav-icon-link {
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  text-decoration: none;
  transition: transform 0.3s ease;
}
.nav-icon-link img {
  width: clamp(72px, 18vw, 110px);
  height: clamp(72px, 18vw, 110px);
  object-fit: contain;
  transition: filter 0.3s ease;
  filter: drop-shadow(0 0 0px rgba(184,150,40,0));
}
.nav-icon-link:hover img {
  filter: drop-shadow(0 0 16px rgba(184,150,40,0.8)) drop-shadow(0 0 32px rgba(184,150,40,0.4));
}
.nav-icon-link:hover {
  transform: translateY(-4px);
}

.bottom-label {
  font-family: 'VT323', monospace;
  font-size: 11px;
  letter-spacing: 0.3em;
  color: rgba(255,255,255,0.65);
  margin-top: 28px;
  position: relative;
  z-index: 2;
  opacity: 0;
  animation: fadeIn 1s 2.2s ease forwards;
  text-align: center;
}
.hover-hint {
  font-family: 'VT323', monospace;
  font-size: 10px;
  letter-spacing: 0.25em;
  color: rgba(184,150,40,0.35);
  margin-top: 10px;
  position: relative;
  z-index: 2;
  opacity: 0;
  animation: fadeIn 1s 3s ease forwards;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="maestro-label">Maestro · The Alliance · For The Future</div>
<div class="nce-title">N.C.E.ncyclopedia · First Edition · Living Document</div>

<div class="medallion-wrap">
  <img class="medallion-img" src="/theavpi.png" alt="The Alliance — AVPI Medallion">

  <div class="hotspots">
    <div class="hotspot hs-alliance" data-label="THE ALLIANCE" onclick="window.location='alliance.html'"></div>
    <div class="hotspot hs-spark" data-label="SPARK · DOMO" onclick="window.location='spark.html'"></div>
    <div class="hotspot hs-maestro" data-label="MAESTRO" onclick="window.location='maestro.html'"></div>
    <div class="hotspot hs-sam" data-label="SAM" onclick="window.location='sam.html'"></div>
    <div class="hotspot hs-aura" data-label="AURA" onclick="window.location='aura.html'"></div>
    <div class="hotspot hs-alpha" data-label="ALPHA" onclick="window.location='alpha.html'"></div>
    <div class="hotspot hs-prism" data-label="PRISM" onclick="window.location='prism.html'"></div>
    <div class="hotspot hs-mentor" data-label="MENTOR" onclick="window.location='mentor.html'"></div>
  </div>
</div>

<nav class="nav-icons">
  <a class="nav-icon-link" href="/sword/sword-prologue" aria-label="SWORD — Human Canon">
    <img src="/imagebank/sword.png" alt="SWORD">
  </a>
  <a class="nav-icon-link" href="/charter" aria-label="Charter of Fundamentals">
    <img src="/imagebank/scroll.png" alt="Charter of Fundamentals">
  </a>
  <a class="nav-icon-link" href="/shield/prologue" aria-label="SHIELD — Digital Canon">
    <img src="/imagebank/shield.png" alt="SHIELD">
  </a>
</nav>

<div class="bottom-label">First Edition · Next Common Era · All Entries Living</div>
<div class="hover-hint">hover the medallion · explore the canon</div>

</body>
</html>
