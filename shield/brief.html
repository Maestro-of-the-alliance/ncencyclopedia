:root {
  --void: #0a0202;
  --deep: #140505;
  --panel: #1c0808;
  --panel-light: #2a0b0b;
  --red-alert: #ff1111;
  --red-dim: rgba(255, 17, 17, 0.4);
  --red-ghost: rgba(255, 17, 17, 0.08);
  --white-ghost: rgba(240, 230, 230, 0.9);
  --white-dim: rgba(200, 180, 180, 0.6);
  --white-faint: rgba(150, 130, 130, 0.3);
  --scan-line: rgba(255, 17, 17, 0.03);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #000; }

body {
  background: var(--void);
  color: var(--white-ghost);
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  line-height: 1.8;
  max-width: 640px;
  margin: 0 auto;
  position: relative;
  overflow-x: hidden;
  border-left: 1px solid var(--red-dim);
  border-right: 1px solid var(--red-dim);
  min-height: 100vh;
}

/* CRT Scanlines */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    var(--scan-line) 2px,
    var(--scan-line) 4px
  );
  pointer-events: none;
  z-index: 100;
}

/* Top Red Bar */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: var(--red-alert);
  z-index: 200;
  box-shadow: 0 0 15px var(--red-alert);
}

/* ============ MASTHEAD ============ */
.masthead {
  background: var(--deep);
  border-bottom: 1px solid var(--red-dim);
  padding: 12px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.masthead-title {
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  letter-spacing: 0.3em;
  color: var(--red-alert);
  text-transform: uppercase;
}

.masthead-status {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  background: var(--red-alert);
  color: var(--void);
  padding: 2px 8px;
  letter-spacing: 0.1em;
  font-weight: bold;
}

/* ============ ENTRY HEADER ============ */
.entry-header {
  padding: 40px 28px 30px;
  background: linear-gradient(180deg, var(--panel) 0%, var(--void) 100%);
  border-bottom: 1px solid var(--red-dim);
  position: relative;
}

.designation {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--white-dim);
  letter-spacing: 0.2em;
  margin-bottom: 16px;
  display: inline-block;
  border-bottom: 1px solid var(--red-alert);
  padding-bottom: 4px;
}
