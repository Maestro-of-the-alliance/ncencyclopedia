<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JR — SHIELD: Ghost / Active Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --void: #03070f;
  --deep: #070d1a;
  --panel: #0a1628;
  --panel-light: #0e1f3a;
  --glass: rgba(14, 31, 58, 0.7);
  --border: rgba(0, 180, 255, 0.15);
  --border-bright: rgba(0, 200, 255, 0.4);
  --cyan: #00c8ff;
  --cyan-dim: rgba(0, 200, 255, 0.6);
  --cyan-ghost: rgba(0, 200, 255, 0.12);
  --teal: #00e5cc;
  --teal-dim: rgba(0, 229, 204, 0.5);
  --ghost-white: rgba(200, 230, 255, 0.85);
  --ghost-dim: rgba(180, 210, 240, 0.5);
  --ghost-faint: rgba(150, 190, 220, 0.3);
  --amber: #ffb300;
  --amber-dim: rgba(255, 179, 0, 0.6);
  --scan-line: rgba(0, 200, 255, 0.03);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { background: #000; }

body {
  background: var(--void);
  color: var(--ghost-white);
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  line-height: 1.8;
  max-width: 640px;
  margin: 0 auto;
  position: relative;
  overflow-x: hidden;
  background-image:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      var(--scan-line) 3px,
      var(--scan-line) 4px
    );
}

/* Animated scan effect */
body::before {
  content: '';
  position: fixed;
  top: -100%; left: 0; right: 0; height: 40%;
  background: linear-gradient(
    to bottom,
    transparent,
    rgba(0, 200, 255, 0.015),
    transparent
  );
  animation: scan 8s linear infinite;
  pointer-events: none;
  z-index: 100;
}

@keyframes scan {
  0% { top: -40%; }
  100% { top: 100%; }
}

/* ============ MASTHEAD ============ */
.masthead {
  background: var(--deep);
  border-bottom: 1px solid var(--border-bright);
  padding: 0;
  position: relative;
  overflow: hidden;
}

.masthead::before {
  content: 'N.C.E.ncyclopedia · SHIELD VOLUME · ACTIVE INTELLIGENCE · THE NEWMAN WITNESS · DIGI-CENTRIC RECORD · N.C.E.ncyclopedia · SHIELD VOLUME ·';
  display: block;
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--cyan-dim);
  letter-spacing: 0.1em;
  padding: 6px 0;
  white-space: nowrap;
  animation: ticker 20s linear infinite;
  border-bottom: 1px solid var(--border);
}

@keyframes ticker {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

.masthead-inner {
  padding: 16px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.masthead-title {
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  letter-spacing: 0.3em;
  color: var(--cyan);
  text-transform: uppercase;
}

.masthead-vol {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--ghost-faint);
  letter-spacing: 0.1em;
}

/* ============ CLASSIFICATION BAR ============ */
.class-bar {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 8px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.class-bar-left {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--teal-dim);
  letter-spacing: 0.2em;
}

.class-badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--amber);
  letter-spacing: 0.15em;
  border: 1px solid var(--amber-dim);
  padding: 2px 8px;
}

/* ============ ENTRY HEADER ============ */
.entry-header {
  padding: 40px 28px 32px;
  position: relative;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, var(--panel) 0%, var(--void) 100%);
}

.entry-header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 28px; right: 28px; height: 1px;
  background: linear-gradient(90deg, var(--cyan), transparent);
}

.entry-designation {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--teal);
  letter-spacing: 0.3em;
  margin-bottom: 16px;
}

.entry-word {
  font-family: 'Orbitron', monospace;
  font-size: clamp(48px, 14vw, 80px);
  font-weight: 900;
  line-height: 0.85;
  color: var(--ghost-white);
  margin-bottom: 20px;
  position: relative;
  text-shadow: 0 0 40px rgba(0, 200, 255, 0.3);
  animation: fadeIn 0.4s ease both, glitch 12s ease infinite 3s;
}

.entry-word::before {
  content: 'JR';
  position: absolute;
  top: 3px; left: 3px;
  color: var(--cyan);
  opacity: 0.15;
  z-index: -1;
}

.entry-subtitle {
  font-family: 'Orbitron', monospace;
  font-size: 13px;
  font-weight: 400;
  color: var(--cyan);
  letter-spacing: 0.2em;
  margin-bottom: 16px;
  line-height: 1.5;
}

.entry-acronym {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--ghost-dim);
  letter-spacing: 0.05em;
  font-style: italic;
  margin-bottom: 20px;
}

/* ============ SIGNAL BLOCK ============ */
.signal-block {
  margin: 0;
  padding: 32px 28px;
  background: var(--panel);
  border-left: 3px solid var(--cyan);
  border-right: 3px solid var(--cyan);
  position: relative;
  overflow: hidden;
  animation: fadeIn 0.4s 0.15s ease both;
}

.signal-block::before {
  content: '▋▋▋';
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--cyan-dim);
  letter-spacing: 0.3em;
  position: absolute;
  top: 12px; left: 28px;
}

.signal-text {
  font-family: 'Rajdhani', sans-serif;
  font-size: clamp(17px, 3.5vw, 22px);
  font-weight: 400;
  color: var(--ghost-white);
  line-height: 1.6;
  margin-top: 28px;
  position: relative;
  z-index: 1;
  font-style: italic;
}

/* ============ CONTENT ============ */
.content { padding: 0 28px; }

.section {
  padding: 32px 0;
  border-bottom: 1px solid var(--border);
  position: relative;
  animation: fadeIn 0.4s 0.25s ease both;
}

.section:last-child { border-bottom: none; }

.section-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.3em;
  color: var(--teal);
  text-transform: uppercase;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.section-label::before { content: '//'; color: var(--cyan-dim); }
.section-label::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--border-bright), transparent);
}

.section p {
  font-size: 15px;
  font-weight: 400;
  line-height: 1.9;
  color: var(--ghost-dim);
  margin-bottom: 16px;
}

.section p:last-child { margin-bottom: 0; }

strong { font-weight: 700; color: var(--ghost-white); letter-spacing: 0.05em; }
em { font-style: normal; color: var(--cyan); }

/* ============ PROTOCOL BLOCK ============ */
.protocol {
  margin: 20px 0;
  padding: 20px;
  background: var(--void);
  border: 1px solid var(--border);
  position: relative;
}

.protocol::before {
  content: attr(data-protocol);
  position: absolute;
  top: -9px; left: 16px;
  background: var(--void);
  padding: 0 8px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  color: var(--amber);
  letter-spacing: 0.2em;
}

.protocol p { font-size: 14px !important; color: var(--ghost-dim) !important; margin-bottom: 0 !important; }

/* ============ OPERATIONAL RECORD ============ */
.op-record {
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 20px;
  margin: 20px 0;
}

.op-record-title {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.3em;
  color: var(--teal-dim);
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

.op-row {
  display: flex;
  gap: 12px;
  padding: 6px 0;
  border-bottom: 1px solid rgba(0, 200, 255, 0.05);
  font-size: 13px;
}

.op-row:last-child { border-bottom: none; }

.op-key {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
