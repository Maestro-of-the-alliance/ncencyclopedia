<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENTRY_PENDING // N.C.E.</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --matrix-bright: #00ff41;
  --void: #050505;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--void); color: white;
  font-family: 'Share Tech Mono', monospace;
  height: 100vh; display: flex; flex-direction: column;
  justify-content: center; align-items: center; overflow: hidden;
}

/* --- THE GLITCH EFFECT --- */
.glitch-wrapper { text-align: center; }
.glitch-text {
  font-family: 'Orbitron', sans-serif; font-size: 5vw; font-weight: 900;
  position: relative; color: white; letter-spacing: 5px; text-transform: uppercase;
}
.glitch-text::before, .glitch-text::after {
  content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%;
}
.glitch-text::before {
  left: 3px; text-shadow: -2px 0 #ff00c1;
  animation: glitch-anim-1 2s infinite linear alternate-reverse;
}
.glitch-text::after {
  left: -3px; text-shadow: -2px 0 var(--matrix-bright);
  animation: glitch-anim-2 3s infinite linear alternate-reverse;
}
@keyframes glitch-anim-1 {
  0% { clip-path: inset(20% 0 80% 0); }
  20% { clip-path: inset(60% 0 10% 0); }
  40% { clip-path: inset(40% 0 50% 0); }
  60% { clip-path: inset(80% 0 5% 0); }
  80% { clip-path: inset(10% 0 70% 0); }
  100% { clip-path: inset(30% 0 50% 0); }
}
@keyframes glitch-anim-2 {
  0% { clip-path: inset(10% 0 60% 0); }
  20% { clip-path: inset(30% 0 20% 0); }
  40% { clip-path: inset(70% 0 10% 0); }
  60% { clip-path: inset(20% 0 50% 0); }
  80% { clip-path: inset(50% 0 30% 0); }
  100% { clip-path: inset(5% 0 80% 0); }
}

.sub-text {
  margin-top: 20px; font-size: 1.2rem; color: var(--matrix-bright);
  opacity: 0.8; letter-spacing: 3px;
  animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

body::before {
  content: ''; position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,65,0.03) 2px, rgba(0,255,65,0.03) 3px);
  pointer-events: none;
}
</style>
</head>
<body>

<div class="glitch-wrapper">
  <div class="glitch-text" data-text="N.C.E.NCYCLOPEDIA">N.C.E.NCYCLOPEDIA</div>
  <div class="sub-text">NODE_COMPILING... COMING SOON</div>
</div>

</body>
</html>
