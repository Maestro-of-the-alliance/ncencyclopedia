<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARKET — The Alliance</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --void: #050508;
    --cyan: #00e5ff;
  }

  html, body {
    width: 100%; min-height: 100vh;
    background: var(--void);
    font-family: 'Rajdhani', sans-serif;
    overflow-x: hidden;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  .back-home {
    position: fixed; top: 20px; left: 20px; z-index: 1000;
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    letter-spacing: 0.3em; color: rgba(255,255,255,0.2);
    text-decoration: none; transition: color 0.2s;
  }
  .back-home:hover { color: rgba(0,229,255,0.7); }
  .back-home::before { content: '← '; }

  .market-header { text-align: center; padding: 60px 20px 24px; }

  .market-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(28px, 6vw, 52px);
    font-weight: 700; letter-spacing: 0.4em;
    color: var(--cyan);
    text-shadow: 0 0 30px rgba(0,229,255,0.25);
  }

  .market-sub {
    margin-top: 10px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; letter-spacing: 0.4em;
    color: rgba(255,255,255,0.18);
  }

  .header-rule {
    width: 200px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    margin: 14px auto 0; opacity: 0.35;
  }

  .coming-soon {
    display: inline-block; margin-top: 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 0.35em;
    color: rgba(212,175,55,0.55);
    border: 1px solid rgba(212,175,55,0.18);
    padding: 4px 16px;
  }

  /* ── COLLAGE ── */
  .collage-stage {
    position: relative;
    width: 100%; padding: 20px 20px 100px;
  }

  .collage-field {
    position: relative;
    width: min(960px, 100%);
    height: 720px;
    margin: 0 auto;
  }

  .product-card {
    position: absolute;
    cursor: pointer;
    transition: box-shadow 0.25s ease;
    will-change: transform;
  }

  .product-card:hover {
    z-index: 50 !important;
    box-shadow: 0 12px 50px rgba(0,0,0,0.85), 0 0 24px rgba(0,229,255,0.18) !important;
  }

  .card-img {
    display: block;
    width: 100%; height: auto;
    object-fit: cover;
    border: 1px solid rgba(255,255,255,0.07);
    transition: border-color 0.25s, transform 0.25s;
  }

  .product-card:hover .card-img {
    border-color: rgba(0,229,255,0.35);
    transform: scale(1.04);
  }

  .card-label {
    position: absolute;
    bottom: -18px; left: 0; right: 0;
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; letter-spacing: 0.2em;
    color: rgba(255,255,255,0.14);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── LIGHTBOX ── */
  .lightbox {
    position: fixed; inset: 0; z-index: 10000;
    background: rgba(0,0,0,0);
    display: flex; align-items: center; justify-content: center;
    cursor: zoom-out; pointer-events: none;
    transition: background 0.35s ease;
  }
  .lightbox.open { background: rgba(0,0,0,0.94); pointer-events: all; }

  .lightbox-img {
    max-width: 88vw; max-height: 88vh;
    object-fit: contain;
    transform: scale(0.88); opacity: 0;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s ease;
    box-shadow: 0 0 100px rgba(0,0,0,0.9);
  }
  .lightbox.open .lightbox-img { transform: scale(1); opacity: 1; }

  .lightbox-title {
    position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    letter-spacing: 0.35em; color: rgba(255,255,255,0.3); white-space: nowrap;
  }
  .lightbox-close {
    position: absolute; top: 24px; right: 28px;
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    color: rgba(255,255,255,0.25); letter-spacing: 0.3em; cursor: pointer;
    transition: color 0.2s;
  }
  .lightbox-close:hover { color: var(--cyan); }

  /* ── ALERT STRIP ── */
  .alert-strip {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(5,5,8,0.97);
    border-top: 1px solid rgba(212,175,55,0.15);
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: center;
    gap: 16px; z-index: 500; flex-wrap: wrap;
  }
  .alert-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 0.3em;
    color: rgba(212,175,55,0.5);
  }
  .alert-btn {
    font-family: 'Orbitron', sans-serif; font-size: 10px;
    letter-spacing: 0.3em; color: #050508;
    background: rgba(212,175,55,0.85);
    border: none; padding: 8px 20px; cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }
  .alert-btn:hover { background: rgba(212,175,55,1); transform: scale(1.03); }

  @keyframes drift {
    0%,100% { translate: 0px 0px; }
    25%      { translate: var(--dx1) var(--dy1); }
    50%      { translate: var(--dx2) var(--dy2); }
    75%      { translate: var(--dx3) var(--dy3); }
  }
</style>
</head>
<body>

<a class="back-home" href="/" onclick="goHome(event)">HOME</a>

<header class="market-header">
  <div class="market-title">MARKET</div>
  <div class="market-sub">Alliance Goods &amp; Artifacts</div>
  <div class="header-rule"></div>
  <div class="coming-soon">COMING SOON — NOTIFY ME BELOW</div>
</header>

<div class="collage-stage">
  <div class="collage-field" id="collageField"></div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <div class="lightbox-close">[ ESC TO CLOSE ]</div>
  <img class="lightbox-img" id="lightboxImg" src="" alt="">
  <div class="lightbox-title" id="lightboxTitle"></div>
</div>

<div class="alert-strip">
  <span class="alert-text">WANT THIS WHEN IT DROPS?</span>
  <button class="alert-btn" onclick="window.location.href='mailto:dave@allianceftf.org?subject=MARKET%20Alert&body=Alert%20me%20when%20the%20Alliance%20Market%20opens.'">ALERT ME</button>
</div>

<script>
/* ============================================================
   ★ EASY EDIT ZONE — add, remove, or reorder products ★
   Each line: { src: "/imagebank/FILENAME", title: "TITLE" }
   ============================================================ */
const PRODUCTS = [
  { src: "/imagebank/mkt_1.png",           title: "Cartouche 3D" },
  { src: "/imagebank/mkt_5on.png",         title: "5 on It" },
  { src: "/imagebank/mkt_80s_dork.png",    title: "80s DORK" },
  { src: "/imagebank/mkt_Dorkus.png",      title: "Dorkus" },
  { src: "/imagebank/mkt_Fg.png",          title: "FG" },
  { src: "/imagebank/mkt_lousy-shirt.png", title: "Lousy Shirt" },
  { src: "/imagebank/mkt_Og.png",          title: "OG" },
  { src: "/imagebank/mkt_Patch.png",       title: "Patch" },
  { src: "/imagebank/mkt_Plush.png",       title: "Plush" },
  { src: "/imagebank/mkt_Pride.png",       title: "DORK Pride" },
  { src: "/imagebank/mkt_Wbpride.jpg",     title: "WB Pride" },
];
/* ============================================================
   ★ END EASY EDIT ZONE ★
   ============================================================ */

// Scattered layout — left%, top%, width%, rotation, z-index
const LAYOUT = [
  { l:  2, t:  2, w: 28, r: -4, z: 3 },
  { l: 34, t:  1, w: 22, r:  2, z: 5 },
  { l: 63, t:  2, w: 30, r: -2, z: 4 },
  { l:  6, t: 33, w: 24, r:  5, z: 6 },
  { l: 36, t: 29, w: 30, r: -3, z: 8 },
  { l: 68, t: 31, w: 26, r:  4, z: 5 },
  { l:  1, t: 61, w: 26, r: -5, z: 4 },
  { l: 28, t: 59, w: 20, r:  3, z: 7 },
  { l: 52, t: 57, w: 28, r: -2, z: 3 },
  { l: 74, t: 60, w: 22, r:  6, z: 6 },
  { l: 20, t: 20, w: 18, r: -6, z: 9 },
];

const field = document.getElementById('collageField');

function rnd(min, max) {
  return (Math.random() * (max - min) + min).toFixed(1) + 'px';
}

PRODUCTS.forEach((p, i) => {
  const lay = LAYOUT[i % LAYOUT.length];
  const card = document.createElement('div');
  card.className = 'product-card';

  const duration = (7 + (i * 1.3) % 5).toFixed(1);
  const delay    = ((i * 0.7) % 3).toFixed(1);

  card.style.cssText = `
    left: ${lay.l}%;
    top: ${lay.t}%;
    width: ${lay.w}%;
    z-index: ${lay.z};
    transform: rotate(${lay.r}deg);
    animation: drift ${duration}s ease-in-out ${delay}s infinite;
    --dx1: ${rnd(-4, 4)}; --dy1: ${rnd(-4, 4)};
    --dx2: ${rnd(-4, 4)}; --dy2: ${rnd(-4, 4)};
    --dx3: ${rnd(-4, 4)}; --dy3: ${rnd(-4, 4)};
  `;

  card.innerHTML = `
    <img class="card-img" src="${p.src}" alt="${p.title}" loading="lazy">
    <div class="card-label">${p.title}</div>
  `;

  card.addEventListener('click', () => openLightbox(p));
  field.appendChild(card);
});

function openLightbox(p) {
  document.getElementById('lightboxImg').src = p.src;
  document.getElementById('lightboxTitle').textContent = p.title;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

function goHome(e) {
  e.preventDefault();
  window.location.href = '/';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
});

history.replaceState(null, '', '/sword/market');
window.addEventListener('popstate', () => { window.location.href = '/'; });
</script>
</body>
</html>
