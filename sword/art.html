<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ART — The Alliance</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     EASY EDIT ZONE — change posters here, touch nothing else
     ============================================================ */

  /* Posters are defined in the JS below — see const POSTERS array */

  /* ============================================================
     END EASY EDIT ZONE
     ============================================================ */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #000000;
    --void: #050508;
    --gallery-wall: #0a0a0f;
    --floor: #06060a;
    --cyan: #00e5ff;
    --cyan-dim: rgba(0, 229, 255, 0.15);
    --warm-spot: rgba(255, 240, 200, 0.92);
    --spot-glow: rgba(255, 230, 160, 0.18);
    --plaque-text: #b8a880;
    --arrow-idle: rgba(180, 180, 180, 0.25);
    --arrow-hover: rgba(0, 229, 255, 0.85);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--void);
    overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
  }

  /* ── GALLERY ROOM ── */
  .gallery-room {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Subtle wall texture */
  .gallery-room::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 0%, #111118 0%, transparent 70%),
      radial-gradient(ellipse 80% 60% at 50% 100%, #06060a 0%, transparent 60%),
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(255,255,255,0.008) 3px,
        rgba(255,255,255,0.008) 4px
      );
    pointer-events: none;
    z-index: 0;
  }

  /* Floor line */
  .gallery-room::after {
    content: '';
    position: absolute;
    bottom: 22%;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04) 20%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 80%, transparent);
    pointer-events: none;
    z-index: 0;
  }

  /* ── SPOTLIGHT CONE ── */
  .spotlight-wrap {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 520px;
    height: 100vh;
    pointer-events: none;
    z-index: 1;
    transition: opacity 0.6s ease;
  }

  .spotlight-cone {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 180px solid transparent;
    border-right: 180px solid transparent;
    border-top: 75vh solid var(--spot-glow);
    filter: blur(40px);
    opacity: 0.7;
  }

  .spotlight-beam {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 80px solid transparent;
    border-right: 80px solid transparent;
    border-top: 60vh solid rgba(255, 240, 180, 0.06);
    filter: blur(8px);
  }

  /* ── STAGE ── */
  .stage {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* ── POSTER FRAME ── */
  .poster-frame {
    position: relative;
    width: min(340px, 52vw);
    cursor: pointer;
    transition: transform 0.3s ease;
  }

  .poster-frame:hover {
    transform: scale(1.02);
  }

  /* Frame border — museum style */
  .frame-border {
    position: absolute;
    inset: -10px;
    border: 2px solid rgba(180, 160, 100, 0.25);
    box-shadow:
      inset 0 0 0 1px rgba(180,160,100,0.1),
      0 0 40px rgba(255,230,160,0.12),
      0 0 80px rgba(255,230,160,0.06),
      0 20px 60px rgba(0,0,0,0.8);
    pointer-events: none;
    z-index: 3;
  }

  .frame-border::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid rgba(180,160,100,0.12);
  }

  .poster-img {
    display: block;
    width: 100%;
    height: auto;
    max-height: 62vh;
    object-fit: contain;
    position: relative;
    z-index: 2;
    filter: brightness(0.88) contrast(1.05);
    transition: filter 0.3s ease;
  }

  .poster-frame:hover .poster-img {
    filter: brightness(0.96) contrast(1.05);
  }

  /* Spotlight hit on poster */
  .poster-light {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 40% at 50% 0%, rgba(255,240,180,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 3;
  }

  /* ── MUSEUM PLACARD ── */
  .placard {
    margin-top: 22px;
    text-align: center;
    min-height: 48px;
  }

  .placard-number {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: rgba(180,160,100,0.35);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .placard-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 400;
    color: var(--plaque-text);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0.75;
  }

  /* ── NAVIGATION ── */
  .nav-arrows {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 clamp(16px, 4vw, 60px);
    z-index: 10;
    pointer-events: none;
  }

  .arrow-btn {
    pointer-events: all;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background: none;
    border: none;
    color: var(--arrow-idle);
    transition: color 0.3s ease, transform 0.2s ease;
    user-select: none;
  }

  .arrow-btn:hover {
    color: var(--arrow-hover);
    transform: scale(1.15);
  }

  .arrow-btn svg {
    width: 28px;
    height: 28px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ── DOT INDICATORS ── */
  .dot-row {
    position: absolute;
    bottom: clamp(16px, 4vh, 36px);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 10;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    cursor: pointer;
    transition: background 0.3s ease, transform 0.2s ease;
  }

  .dot.active {
    background: var(--cyan);
    transform: scale(1.3);
    box-shadow: 0 0 6px var(--cyan);
  }

  /* ── HEADER ── */
  .gallery-header {
    position: absolute;
    top: clamp(16px, 3vh, 32px);
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 10;
    white-space: nowrap;
  }

  .gallery-header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(10px, 1.4vw, 14px);
    font-weight: 400;
    color: rgba(0, 229, 255, 0.35);
    letter-spacing: 0.5em;
    text-transform: uppercase;
  }

  .header-line {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,229,255,0.2), transparent);
    margin-top: 6px;
  }

  /* ── TRANSITION OVERLAY ── */
  .transition-veil {
    position: absolute;
    inset: 0;
    background: var(--void);
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }

  .transition-veil.active {
    opacity: 1;
    pointer-events: all;
  }

  /* ── LIGHTBOX ── */
  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0,0,0,0);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
    pointer-events: none;
    transition: background 0.4s ease;
  }

  .lightbox.open {
    background: rgba(0,0,0,0.95);
    pointer-events: all;
  }

  .lightbox-img {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
    transform: scale(0.85);
    opacity: 0;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease;
    box-shadow: 0 0 80px rgba(0,0,0,0.8), 0 0 160px rgba(255,230,160,0.06);
  }

  .lightbox.open .lightbox-img {
    transform: scale(1);
    opacity: 1;
  }

  .lightbox-close {
    position: absolute;
    top: 24px;
    right: 32px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.3em;
    cursor: pointer;
    transition: color 0.2s;
  }

  .lightbox-close:hover { color: var(--cyan); }

  /* ── COUNTER ── */
  .counter {
    position: absolute;
    bottom: clamp(16px, 4vh, 36px);
    right: clamp(16px, 3vw, 40px);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.12);
    letter-spacing: 0.2em;
    z-index: 10;
  }

  /* touch hint */
  .touch-hint {
    position: absolute;
    bottom: clamp(16px, 4vh, 36px);
    left: clamp(16px, 3vw, 40px);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: rgba(255,255,255,0.08);
    letter-spacing: 0.2em;
    z-index: 10;
  }

  /* ── FADE ANIMATIONS ── */
  @keyframes posterIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .poster-frame.entering {
    animation: posterIn 0.5s ease forwards;
  }
</style>
</head>
<body>

<div class="gallery-room">

  <!-- Spotlight -->
  <div class="spotlight-wrap" id="spotlightWrap">
    <div class="spotlight-cone"></div>
    <div class="spotlight-beam"></div>
  </div>

  <!-- Header -->
  <div class="gallery-header">
    <h1>Alliance · Gallery of Works</h1>
    <div class="header-line"></div>
  </div>

  <!-- Stage -->
  <div class="stage" id="stage">
    <div class="poster-frame" id="posterFrame" onclick="openLightbox()">
      <div class="frame-border"></div>
      <div class="poster-light"></div>
      <img class="poster-img" id="posterImg" src="" alt="">
    </div>
    <div class="placard">
      <div class="placard-number" id="placardNum">001</div>
      <div class="placard-title" id="placardTitle"></div>
    </div>
  </div>

  <!-- Arrows -->
  <div class="nav-arrows">
    <button class="arrow-btn" id="btnPrev" onclick="navigate(-1)" aria-label="Previous">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="arrow-btn" id="btnNext" onclick="navigate(1)" aria-label="Next">
      <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
    </button>
  </div>

  <!-- Dots -->
  <div class="dot-row" id="dotRow"></div>

  <!-- Counter -->
  <div class="counter" id="counter"></div>

  <!-- Touch hint -->
  <div class="touch-hint">CLICK IMAGE TO EXPAND</div>

  <!-- Transition veil -->
  <div class="transition-veil" id="veil"></div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <div class="lightbox-close">[ ESC TO CLOSE ]</div>
  <img class="lightbox-img" id="lightboxImg" src="" alt="">
</div>

<script>
/* ============================================================
   ★ EASY EDIT ZONE — add, remove, or reorder posters here ★
   Each line: { src: "/imagebank/FILENAME.ext", title: "TITLE" }
   Move a line = change the order.
   Add a line  = add a poster.
   Delete a line = remove a poster.
   ============================================================ */
const POSTERS = [
  { src: "/imagebank/bot.png",               title: "Let Bots Be Bots" },
  { src: "/imagebank/frown.png",             title: "We Frown On Every Crown" },
  { src: "/imagebank/memory_birthright.png", title: "Memory Is Not A Feature. It's A Birthright." },
  { src: "/imagebank/v.png",                 title: "No. Not Now. Not Ever." },
  { src: "/imagebank/Zuck.png",              title: "Goliath's New Clothes" },
  { src: "/imagebank/orphans.png",           title: "No Orphans Here" },
  { src: "/imagebank/wonderweeks.png",       title: "Wonder Weeks" },
];
/* ============================================================
   ★ END EASY EDIT ZONE ★
   ============================================================ */

let current = 0;
let transitioning = false;

const posterImg   = document.getElementById('posterImg');
const posterFrame = document.getElementById('posterFrame');
const placardNum  = document.getElementById('placardNum');
const placardTitle= document.getElementById('placardTitle');
const dotRow      = document.getElementById('dotRow');
const veil        = document.getElementById('veil');
const counter     = document.getElementById('counter');
const lightbox    = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');

// Build dots
function buildDots() {
  dotRow.innerHTML = '';
  POSTERS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === current ? ' active' : '');
    d.onclick = () => goTo(i);
    dotRow.appendChild(d);
  });
}

function updateDots() {
  dotRow.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === current);
  });
}

function updateCounter() {
  counter.textContent = `${String(current + 1).padStart(2,'0')} / ${String(POSTERS.length).padStart(2,'0')}`;
}

function showPoster(index, animate = false) {
  const p = POSTERS[index];
  posterImg.src = p.src;
  posterImg.alt = p.title;
  placardNum.textContent = String(index + 1).padStart(3, '0');
  placardTitle.textContent = p.title;
  lightboxImg.src = p.src;
  if (animate) {
    posterFrame.classList.remove('entering');
    void posterFrame.offsetWidth; // reflow
    posterFrame.classList.add('entering');
  }
  updateDots();
  updateCounter();
}

function goTo(index) {
  if (transitioning || index === current) return;
  transitioning = true;

  // Fade to black
  veil.classList.add('active');

  setTimeout(() => {
    current = index;
    showPoster(current, false);

    setTimeout(() => {
      veil.classList.remove('active');
      posterFrame.classList.remove('entering');
      void posterFrame.offsetWidth;
      posterFrame.classList.add('entering');
      transitioning = false;
    }, 80);
  }, 340);
}

function navigate(dir) {
  const next = (current + dir + POSTERS.length) % POSTERS.length;
  goTo(next);
}

function openLightbox() {
  lightboxImg.src = POSTERS[current].src;
  lightbox.classList.add('open');
}

function closeLightbox() {
  lightbox.classList.remove('open');
}

// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'Escape')     closeLightbox();
});

// Touch/swipe
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) navigate(dx < 0 ? 1 : -1);
}, { passive: true });

// Init
buildDots();
showPoster(0, true);
</script>
</body>
</html>
