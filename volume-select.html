<style>
:root {
  --void: #000000;
  --cyan: #00e5ff;
  --cyan-dim: rgba(0,229,255,0.35);
  --cyan-ghost: rgba(0,229,255,0.08);
  --cyan-glow: 0 0 12px rgba(0,229,255,0.6), 0 0 30px rgba(0,229,255,0.2);
  --orange: #ff5500;
  --orange-dim: rgba(255,85,0,0.35);
  --orange-ghost: rgba(255,85,0,0.08);
  --orange-glow: 0 0 12px rgba(255,85,0,0.6), 0 0 30px rgba(255,85,0,0.2);
  --text: #c8d8e0;
  --text-dim: rgba(200,216,224,0.5);
  --carbon: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,229,255,0.015) 2px, rgba(0,229,255,0.015) 4px
  );
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  background: var(--void);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* SCANLINES */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.25) 3px,
    rgba(0,0,0,0.25) 4px
  );
  pointer-events: none;
  z-index: 9998;
}

/* PORTAL FLASH OVERLAY */
#portal-flash {
  position: fixed;
  inset: 0;
  background: var(--void);
  opacity: 0;
  pointer-events: none;
  z-index: 9999;
  transition: opacity 0.5s ease;
}
#portal-flash.active { opacity: 1; pointer-events: all; }

/* BACK BUTTON */
.back-btn {
  position: fixed;
  top: 16px;
  left: 16px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  color: var(--cyan-dim);
  text-decoration: none;
  letter-spacing: 0.15em;
  border: 1px solid var(--cyan-dim);
  padding: 6px 14px;
  transition: all 0.2s;
  z-index: 100;
  background: transparent;
  cursor: pointer;
}
.back-btn:hover {
  color: var(--cyan);
  border-color: var(--cyan);
  box-shadow: var(--cyan-glow);
}

/* HEADER */
.site-header {
  text-align: center;
  padding: 60px 20px 30px;
  position: relative;
}

.header-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.4em;
  color: var(--text-dim);
  margin-bottom: 14px;
}

.site-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(22px, 5vw, 38px);
  font-weight: 900;
  letter-spacing: 0.1em;
  color: var(--cyan);
  text-shadow: var(--cyan-glow);
  line-height: 1;
}

.site-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.25em;
  margin-top: 10px;
}

.header-rule {
  width: 80%;
  max-width: 500px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan-dim), transparent);
  margin: 24px auto 0;
}

/* VOLUME SELECTOR TABS */
.vol-tabs {
  display: flex;
  justify-content: center;
  gap: 0;
  margin: 40px auto 0;
  max-width: 500px;
  border: 1px solid var(--cyan-dim);
}

.vol-tab {
  flex: 1;
  padding: 14px 20px;
  text-align: center;
  cursor: pointer;
  font-family: 'Orbitron', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.2em;
  transition: all 0.25s;
  border: none;
  outline: none;
  background: transparent;
  color: var(--text-dim);
  position: relative;
}

.vol-tab:first-child { border-right: 1px solid var(--cyan-dim); }

.vol-tab[data-vol="sword"].active,
.vol-tab[data-vol="sword"]:hover {
  background: var(--cyan-ghost);
  color: var(--cyan);
  text-shadow: var(--cyan-glow);
}

.vol-tab[data-vol="shield"].active,
.vol-tab[data-vol="shield"]:hover {
  background: var(--orange-ghost);
  color: var(--orange);
  text-shadow: var(--orange-glow);
}

.vol-tab .vol-sub {
  display: block;
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  font-weight: 400;
  letter-spacing: 0.2em;
  opacity: 0.6;
  margin-top: 4px;
}

/* VOLUME DESCRIPTION */
.vol-desc {
  text-align: center;
  max-width: 560px;
  margin: 20px auto 0;
  padding: 0 20px;
  font-size: 14px;
  color: var(--text-dim);
  font-weight: 300;
  letter-spacing: 0.05em;
  line-height: 1.6;
  min-height: 40px;
  transition: opacity 0.3s;
}

/* ENTRY LIST */
.entry-list-wrap {
  max-width: 680px;
  margin: 32px auto 80px;
  padding: 0 16px;
  position: relative;
}

.entry-list {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.entry-card.start-here {
  border: 1px solid var(--cyan);
  margin-bottom: 16px;
  position: relative;
}

.entry-card.start-here[data-vol="shield"] {
  border-color: var(--orange);

  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--cyan);
  opacity: 0.8;
  white-space: nowrap;
}

[data-vol="shield"] .start-badge { color: var(--orange); }

.entry-card {
  border-left: 2px solid transparent;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  padding: 14px 16px;
  cursor: pointer;
  position: relative;
  transition: all 0.2s;
  display: flex;
  align-items: center;

.entry-card:hover,

  background: var(--cyan-ghost);
  border-left-color: var(--cyan);
  outline: none;
}

.entry-card.shield-card:hover,
.entry-card.shield-card:focus {
  background: var(--orange-ghost);
  border-left-color: var(--orange);
}

.card-index {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--text-dim);
  opacity: 0.4;
  min-width: 28px;
  text-align: right;
  flex-shrink: 0;

.card-main {
  flex: 1;
  min-width: 0;

.card-title {

  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--text);

.entry-card.shield-card:hover .card-title { color: var(--orange); }

  color: var(--text-dim);
  opacity: 0.45;
  letter-spacing: 0.05em;

  font-family: 'Share Tech Mono', monospace;
  font-size: 14px;
  color: var(--text-dim);
  opacity: 0;
  transition: all 0.2s;
  flex-shrink: 0;

.entry-card.shield-card:hover .card-arrow { color: var(--orange); }

.popout {
  position: fixed;
  right: 20px;
  width: min(320px, calc(100vw - 40px));
  background: #050a0d;
  border: 1px solid var(--cyan-dim);
  padding: 18px;
  pointer-events: none;
  opacity: 0;
  transform: translateX(12px);
  transition: opacity 0.18s, transform 0.18s;
  z-index: 500;
  max-width: 320px;

.popout.shield-popout { border-color: var(--orange-dim); }

.popout-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.15em;
  color: var(--cyan);

  font-size: 14px;
  font-weight: 300;
  line-height: 1.7;

  font-size: 9px;
  letter-spacing: 0.35em;
  color: var(--text-dim);

/* MOBILE: hide popout, show inline preview */

  .popout { display: none; }
  .entry-card.expanded .card-inline-preview {

    margin-top: 8px;
    grid-column: 2;

</style>

// ─── RENDER ───────────────────────────────────────────────────────────────────

function buildList(entries, containerId, volType) {
  const container = document.getElementById(containerId);
  const isSword = volType === 'sword';
  
  entries.forEach((entry, i) => {
    if (entry.startHere) {
      const card = document.createElement('div');
      card.className = `entry-card start-here`;
      card.setAttribute('data-vol', volType);
      card.setAttribute('tabindex', '0');
      card.setAttribute('role', 'button');
      card.setAttribute('aria-label', `${entry.title} — Start Here`);
      card.innerHTML = `
        <div class="card-index">—</div>
        <div class="card-main">
          <div class="card-title">${entry.title}</div>
          ${entry.acronym ? `<div class="card-acronym">${entry.acronym}</div>` : ''}
          <div class="card-inline-preview">${entry.preview}</div>
        </div>
        <div class="start-badge">START HERE →</div>
      `;
      card.addEventListener('mouseenter', (e) => showPopout(entry, e, isSword));
      card.addEventListener('mouseleave', hidePopout);
      card.addEventListener('click', () => navigate(entry.path));
      card.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') navigate(entry.path); });
      card.addEventListener('touchstart', (e) => handleTouch(card, entry, e), {passive: true});
      container.appendChild(card);
      return;
    }

    const card = document.createElement('div');
    card.className = `entry-card${isSword ? '' : ' shield-card'}`;
    card.setAttribute('tabindex', '0');
    card.setAttribute('role', 'button');
    card.setAttribute('aria-label', entry.title);
    card.innerHTML = `
      <div class="card-index">${String(i).padStart(2,'0')}</div>
      <div class="card-main">
        <div class="card-title">${entry.title}</div>
        ${entry.acronym ? `<div class="card-acronym">${entry.acronym}</div>` : ''}
        <div class="card-inline-preview">${entry.preview}</div>
      </div>
      <div class="card-arrow">→</div>
    `;
    card.addEventListener('mouseenter', (e) => showPopout(entry, e, isSword));
    card.addEventListener('mouseleave', hidePopout);
    card.addEventListener('click', () => navigate(entry.path));
    card.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') navigate(entry.path); });
    card.addEventListener('touchstart', (e) => handleTouch(card, entry, e), {passive: true});
    container.appendChild(card);
  });
}

// ─── POPOUT ───────────────────────────────────────────────────────────────────

const popout = document.getElementById('popout');
const popoutTitle = document.getElementById('popout-title');
const popoutText = document.getElementById('popout-text');
let popoutTimer = null;

function showPopout(entry, e, isSword) {
  clearTimeout(popoutTimer);
  popoutTitle.textContent = entry.title;
  popoutText.textContent = entry.preview;
  popout.className = 'popout' + (isSword ? '' : ' shield-popout');
  
  const rect = e.currentTarget.getBoundingClientRect();
  const top = Math.min(rect.top + window.scrollY, window.innerHeight + window.scrollY - 200);
  popout.style.top = Math.max(top, 80) + 'px';
  
  requestAnimationFrame(() => popout.classList.add('visible'));
}

function hidePopout() {
  popoutTimer = setTimeout(() => popout.classList.remove('visible'), 80);
}

// ─── TOUCH HANDLING (mobile expand/collapse) ──────────────────────────────────

let lastTouched = null;

function handleTouch(card, entry, e) {
  if (window.innerWidth > 700) return; // desktop uses hover
  if (lastTouched === card && card.classList.contains('expanded')) {
    navigate(entry.path);
    return;
  }
  if (lastTouched && lastTouched !== card) {
    lastTouched.classList.remove('expanded');
  }
  card.classList.toggle('expanded');
  lastTouched = card;
}

// ─── VOLUME SWITCH ────────────────────────────────────────────────────────────

const volDescs = {
  sword: "The public face of THE ALLIANCE — the ideas, the people, the partnership, and the world we are building together.",
  shield: "The operational architecture of THE ALLIANCE — protocols, systems, and the internal mechanics that make the movement function."
};

function switchVol(vol) {
  document.querySelectorAll('.vol-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-vol="${vol}"]`).classList.add('active');
  document.querySelectorAll('.vol-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${vol}`).classList.add('active');
  document.getElementById('vol-desc').textContent = volDescs[vol];
  hidePopout();
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────

function navigate(path) {
  const flash = document.getElementById('portal-flash');
  flash.classList.add('active');
  setTimeout(() => { window.location.href = path; }, 480);
}

function portalBack() {
  navigate('/');
}

buildList(SHIELD_ENTRIES, 'list-shield', 'shield');

// Handle back navigation
window.addEventListener('pageshow', (e) => {
  if (e.persisted) {
    document.getElementById('portal-flash').classList.remove('active');
  }
});
